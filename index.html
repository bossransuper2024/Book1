<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>EPS Book</title>
<style>
body {
  background: #0f172a;
  color: white;
  text-align: center;
  font-family: Arial;
}

.container {
  position: relative;
  display: inline-block;
  margin-top: 20px;
}

.container img {
  width: 700px;
  border-radius: 10px;
}

/* AUDIO BUTTON */
.audio-btn {
  position: absolute;
  background: rgba(0,0,0,0.6);
  border: none;
  color: white;
  font-size: 18px;
  padding: 6px 10px;
  border-radius: 50%;
  cursor: pointer;
}

/* NAVIGATION */
.nav {
  margin-top: 20px;
}

.nav a {
  text-decoration: none;
  padding: 10px 20px;
  background: #2563eb;
  color: white;
  border-radius: 8px;
  margin: 10px;
}

.nav a:hover {
  background: #1d4ed8;
}
</style>
</head>
<body>

<h2>EPS Book 1 - Page 1</h2>

<div class="container">
 <!-- PAGE IMAGE -->
  <img src="images/book1-0001.jpeg">



<div class="nav">

  <a id="next" href="page0002.html">Next ➡️</a>
</div>

<script>
// Play audio function
function playAudio(id) {
  document.querySelectorAll("audio").forEach(a => { a.pause(); a.currentTime = 0; });
  document.getElementById(id).play();
}

// Auto-update page info

</script>

</body>
</html>
